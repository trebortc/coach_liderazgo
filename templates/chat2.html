<!DOCTYPE html>
<html>
<head>
    <title>Chat Liderazgo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h3>ChatGPT – Liderazgo</h3>

<form id="chatForm">
    <input class="form-control" id="pregunta" placeholder="Escribe tu pregunta..." required>
    <button class="btn btn-primary mt-2">Enviar</button>
</form>

<div class="mt-3" id="respuesta"></div>

<script>
document.getElementById("chatForm").onsubmit = async (e) => {
    e.preventDefault();
    const pregunta = document.getElementById("pregunta").value;

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: "pregunta=" + encodeURIComponent(pregunta)
    });

    const data = await res.json();
    document.getElementById("respuesta").innerHTML =
        "<b>Respuesta:</b><br>" + data.respuesta;
};
</script>

</body>
</html>
