<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>innerly - Coach Emocional</title>
    <link rel="icon" sizes="64x64" href="/static/logo.ico">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="app">

    <h1 class="titulo">
        <img src="{{ url_for('static', path='logo.png') }}" alt="Innerly Logo" class="logo">
    </h1>

    <div class="progreso">
        <div class="paso paso-explorar   {% if progreso.explorar   %}activo{% endif %}">
            <img src="{{ url_for('static', path='explorar.png') }}" alt="Explorar" class="paso-icono">
            <span>EXPLORAR</span>
        </div>
        <div class="paso paso-entender   {% if progreso.entender   %}activo{% endif %}">
            <img src="{{ url_for('static', path='reflexion.png') }}" alt="Entender" class="paso-icono">
            <span>ENTENDER</span>
        </div>
        <div class="paso paso-identificar{% if progreso.identificar %}activo{% endif %}">
            <img src="{{ url_for('static', path='identificar.png') }}" alt="Identificar" class="paso-icono">
            <span>IDENTIFICAR</span>
        </div>
        <div class="paso paso-dirigir    {% if progreso.dirigir    %}activo{% endif %}">
            <img src="{{ url_for('static', path='dirigir.png') }}" alt="Dirigir" class="paso-icono">
            <span>DIRIGIR</span>
        </div>
    </div>

    <div id="chat">
        {% for msg in historial %}
            {% if msg.rol == "usuario" %}
                <div class="mensaje usuario">
                    <strong>Tú:</strong> <p>{{ msg.contenido | safe }}</p>
                </div>
            {% elif msg.rol == "asistente" %}
                <div class="mensaje asistente">
                    <strong>Coach:</strong>{{ msg.contenido | safe }}
                </div>
            {% endif %}
        {% endfor %}
    </div>

    <form id="form-chat">
        <input
            type="text"
            id="mensaje"
            placeholder="Escribe tu respuesta..."
            autocomplete="off"
            required
        />
        <button type="button" id="btn-reiniciar" title="Volver a comenzar desde cero">Reiniciar</button>
        <button type="submit">Enviar</button>
    </form>

</div>

<script src="/static/js/chat.js"></script>
</body>
</html>
