<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat Liderazgo</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .chat-container {
            max-width: 800px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            height: 80vh;
        }

        .chat-header {
            padding: 15px;
            background: #2c3e50;
            color: white;
            border-radius: 10px 10px 0 0;
            text-align: center;
        }

        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .mensaje {
            margin-bottom: 15px;
            max-width: 70%;
            padding: 12px 15px;
            border-radius: 10px;
            line-height: 1.4;
        }

        .usuario {
            background: #d1ecf1;
            align-self: flex-end;
            text-align: right;
        }

        .asistente {
            background: #e9ecef;
            align-self: flex-start;
        }

        .chat-footer {
            padding: 15px;
            border-top: 1px solid #ddd;
        }

        form {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            border-radius: 5px;
            border: none;
            background: #2c3e50;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1a252f;
        }
    </style>
</head>
<body>

<div class="chat-container">
    
    <div class="chat-header">
        <h2>Asistente de Liderazgo</h2>
        <small>Fase actual: <strong>{{ fase }}</small>
    </div>

    <div class="chat-body">
        {% for m in historial %}
            {% if m.rol == "usuario" %}
                <p class="usuario">Tú: {{ m.contenido }}</p>
            {% else %}
                <p class="asistente">Coach: {{ m.contenido | safe }}</p>
            {% endif %}
        {% endfor %}
    </div>

    <div class="chat-footer">
        <form method="post" action="/chat">
            <input type="text" name="pregunta" required>
            <button type="submit">Enviar</button>
        </form>
    </div>

</div>

<script>
    // Scroll automático al último mensaje
    const chatBody = document.querySelector('.chat-body');
    chatBody.scrollTop = chatBody.scrollHeight;
</script>

</body>
</html>
